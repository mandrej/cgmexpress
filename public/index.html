<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>SIBIONICS CGM</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
      body {
        font-family: sans-serif;
        margin: 20px;
        background: #f9f9f9;
      }
      #chart {
        width: 1000px;
        height: 400px;
      }
    </style>
  </head>
  <body>
    <h3>SIBIONICS CGM</h3>
    <div style="display: flex; flex-flow: row nowrap">
      <div id="date-filter" class="col"></div>
      <div id="chart"></div>
    </div>
    <div id="time-brush"></div>

    <script>
      d3.json('/data').then((original) => {
        // --- Parse date/time, value ---
        const parseDate = d3.timeParse('%d-%m-%Y %H:%M');
        const parseTime = d3.timeParse('%H:%M');
        const formatDate = d3.timeFormat('%Y-%m-%d');
        const formatTime = d3.timeFormat('%H:%M');
        const data = original.map((d) => {
          const [datePart, timePart, _] = d.datetime.split(' ');
          if (isNaN(+d.value)) {
            return null;
          } else {
            const dateObj = parseDate(datePart + ' ' + timePart);
            return {
              date: formatDate(dateObj),
              dateObj: dateObj,
              time: formatTime(dateObj),
              timeObj: parseTime(timePart),
              value: +d.value,
            };
          }
        });
        if (data[0] === null) data.shift(); // remove first element
        drawChart(data);
      });

      const drawChart = (data) => {
        const margin = {top: 20, right: 20, bottom: 20, left: 30};
        const width = 1000 - margin.left - margin.right;
        const height = 400 - margin.top - margin.bottom;

        // Color scale
        const uniqueDates = [...new Set(data.map(d => d.date))];
        const colorScale = d3.scaleOrdinal(d3.schemeCategory10).domain(uniqueDates);

        // Initial filter
        let selectedDates = new Set(uniqueDates);
        let timeDomain = [d3.min(data, d => d.timeObj), d3.max(data, d => d.timeObj)];

        // Function to get filtered data
        const getFilteredData = () => {
          return data.filter(d => selectedDates.has(d.date) && d.timeObj >= timeDomain[0] && d.timeObj <= timeDomain[1]);
        };

        // Date filter chart
        const dateGroup = d3.rollup(data, v => v.length, d => d.date);
        const dateData = Array.from(dateGroup, ([date, count]) => ({date, count}));
        const maxCount = d3.max(dateData, d => d.count);
        const dateScale = d3.scaleLinear().domain([0, maxCount]).range([0, 40]);

        const dateSvg = d3.select('#date-filter').append('svg')
          .attr('width', 160)
          .attr('height', 400);

        const dateBars = dateSvg.selectAll('rect')
          .data(dateData)
          .enter().append('rect')
          .attr('x', 10)
          .attr('y', (d, i) => i * 25 + 20)
          .attr('width', d => dateScale(d.count))
          .attr('height', 20)
          .attr('fill', d => selectedDates.has(d.date) ? colorScale(d.date) : 'lightgray')
          .on('click', function(event, d) {
            if (selectedDates.has(d.date)) {
              selectedDates.delete(d.date);
            } else {
              selectedDates.add(d.date);
            }
            d3.select(this).attr('fill', selectedDates.has(d.date) ? colorScale(d.date) : 'lightgray');
            updateMainChart();
          });

        dateSvg.selectAll('text')
          .data(dateData)
          .enter().append('text')
          .attr('x', 60)
          .attr('y', (d, i) => i * 25 + 35)
          .text(d => d.date)
          .style('font-size', '12px');

        // Time brush chart
        const timeSvg = d3.select('#time-brush').append('svg')
          .attr('width', 1000)
          .attr('height', 100);

        const timeScale = d3.scaleTime()
          .domain([d3.min(data, d => d.timeObj), d3.max(data, d => d.timeObj)])
          .range([margin.left, 1000 - margin.right]);

        const timeAxis = d3.axisBottom(timeScale).ticks(d3.timeHour.every(1));

        timeSvg.append('g')
          .attr('transform', `translate(0, ${100 - margin.bottom})`)
          .call(timeAxis);

        // Group data by hour for bars
        const timeGroup = d3.rollup(data, v => v.length, d => d3.timeHour(d.timeObj));
        const timeData = Array.from(timeGroup, ([time, count]) => ({time, count}));
        const maxTimeCount = d3.max(timeData, d => d.count);
        const timeHeightScale = d3.scaleLinear().domain([0, maxTimeCount]).range([0, 60]);

        timeSvg.selectAll('rect')
          .data(timeData)
          .enter().append('rect')
          .attr('x', d => timeScale(d.time))
          .attr('y', d => 100 - margin.bottom - timeHeightScale(d.count))
          .attr('width', 20)
          .attr('height', d => timeHeightScale(d.count))
          .attr('fill', 'steelblue');

        // Brush
        const brush = d3.brushX()
          .extent([[margin.left, 0], [1000 - margin.right, 100 - margin.bottom]])
          .on('brush end', brushed);

        timeSvg.append('g')
          .attr('class', 'brush')
          .call(brush);

        function brushed(event) {
          if (event.selection) {
            const [x0, x1] = event.selection.map(timeScale.invert);
            timeDomain = [x0, x1];
          } else {
            timeDomain = [d3.min(data, d => d.timeObj), d3.max(data, d => d.timeObj)];
          }
          updateMainChart();
        }

        // Main chart
        const mainSvg = d3.select('#chart').append('svg')
          .attr('width', 840)
          .attr('height', 400);

        const xScale = d3.scaleTime()
          .domain(timeDomain)
          .range([margin.left, 840 - margin.right]);

        const yScale = d3.scaleLinear()
          .domain([d3.min(data, d => d.value), d3.max(data, d => d.value)])
          .range([400 - margin.bottom, margin.top]);

        const xAxis = d3.axisBottom(xScale);
        const yAxis = d3.axisLeft(yScale);

        mainSvg.append('g')
          .attr('transform', `translate(0, ${400 - margin.bottom})`)
          .call(xAxis);

        mainSvg.append('g')
          .attr('class', 'y-axis')
          .attr('transform', `translate(${margin.left}, 0)`)
          .call(yAxis);

        // Grid lines
        mainSvg.append('g')
          .attr('class', 'grid')
          .attr('transform', `translate(${margin.left}, 0)`)
          .call(d3.axisLeft(yScale).tickSize(-width).tickFormat(''));

        mainSvg.append('g')
          .attr('class', 'grid')
          .attr('transform', `translate(0, ${400 - margin.bottom})`)
          .call(d3.axisBottom(xScale).tickSize(-height).tickFormat(''));

        mainSvg.selectAll('.grid line').attr('stroke', 'lightgray').attr('stroke-dasharray', '2,2');

        // Lines for each date
        const line = d3.line()
          .x(d => xScale(d.timeObj))
          .y(d => yScale(d.value))
          .curve(d3.curveMonotoneX);

        function updateMainChart() {
          const filtered = getFilteredData();
          const nested = d3.group(filtered, d => d.date);

          // Update lines
          const lines = mainSvg.selectAll('.line')
            .data(nested, ([date]) => date);

          lines.enter().append('path')
            .attr('class', 'line')
            .merge(lines)
            .attr('d', ([date, values]) => line(values.sort((a,b) => a.timeObj - b.timeObj)))
            .attr('stroke', ([date]) => colorScale(date))
            .attr('fill', 'none')
            .attr('stroke-width', 2);

          lines.exit().remove();

          // Update y domain
          const minVal = d3.min(filtered, d => d.value) || 0;
          const maxVal = d3.max(filtered, d => d.value) || 100;
          yScale.domain([minVal - 1, maxVal + 1]);
          mainSvg.select('.y-axis').transition().call(yAxis);

          // Update x domain
          xScale.domain(timeDomain);
          mainSvg.select('.x-axis').transition().call(xAxis);
        }

        // Initial draw
        updateMainChart();
      };
    </script>
  </body>
</html>
